<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <!--Font awsome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Miniver&display=swap"
        rel="stylesheet">
    <!--Font Open Sans-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!--TailwindCss-->
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-mainBG">
    <header>
        <nav class="row items-center justify-between px-7 border-b-secColor border-b">
            <button class="p-5 cursor-pointer">
                <img src="../images/Logo.png" class="bg-auto" alt="">
            </button>
            <ul class="row items-center gap-5 hidden md:flex">
                <a href="../../index.html" class="nav-items tracking-widest OpenSans-CondLight">Home</a>
                <a href="./ourMenu.html" class="nav-items tracking-widest OpenSans-CondLight">Our Menu</a>
                <a href="../pages/ourChef.html" class="nav-items tracking-widest OpenSans-CondLight">Pages</a>
                <a href="../pages/portfolio.html" class="nav-items tracking-widest OpenSans-CondLight">Portfolio</a>
                <a href="../pages/blog.html" class="nav-items tracking-widest OpenSans-CondLight">Blog</a>
            </ul>
            <a href="./signIn.html" class="p-5">
                <i class="fa-solid fa-user text-mainColor text-[30px]"></i>
            </a>
        </nav>
    </header>
    <main>
        <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
            <div class="sm:mx-auto sm:w-full sm:max-w-sm">
                <img src="../images/Logo.png"
                    alt="Your Company" class="mx-auto h-10 w-auto" />
                <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Sign in to your account
                </h2>
            </div>

            <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm/6 font-medium text-gray-100">Email address</label>
                        <div class="mt-2">
                            <input id="email" type="email" name="email" required autocomplete="email"
                                class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between">
                            <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
                            <div class="text-sm">
                                <a href="#" class="font-semibold text-mainColor hover:text-[#d6bc98]">Forgot
                                    password?</a>
                            </div>
                        </div>
                        <div class="mt-2">
                            <input id="password" type="password" name="password" required
                                autocomplete="current-password"
                                class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                        </div>
                    </div>

                    <div>
                        <button type="submit"
                            class="flex w-full justify-center rounded-md bg-mainColor px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-[#d6bc98] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign
                            in</button>
                    </div>
                </form>

                <p class="mt-10 text-center text-sm/6 text-gray-400">
                    Not a member?
                    <a href="#" class="font-semibold text-mainColor hover:text-[#d6bc98]">Start a 14 day free
                        trial</a>
                </p>
            </div>
        </div>
    </main>
</body>

</html>
